name: checks

on:
  push:
  pull_request:

jobs:
  viewer-and-deck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r 600-tools/requirements/dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: python 600-tools/run_checks.py --browser
